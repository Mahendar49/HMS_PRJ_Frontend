<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>HMS Horizontal Menu</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--brand-blue:#0b5ed7;--brand-blue-dark:#084298;--sidebar-bg:#f1f6fb;}
body{font-family:Inter,system-ui,Arial;background:#f8fafc;margin:0}
.topnav{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:white;border-bottom:1px solid rgba(11,18,32,0.06)}
.brand{color:var(--brand-blue);font-weight:700}
.mainmenu{display:flex;gap:18px;align-items:center}
.mainmenu a{color:var(--brand-blue);text-decoration:none;padding:8px 12px;border-radius:6px}
.mainmenu a.active{background:linear-gradient(90deg, rgba(11,94,215,0.08), rgba(11,94,215,0));font-weight:600;color:var(--brand-blue-dark)}
.app-shell{display:flex;height:calc(100vh - 64px);overflow:hidden}
.left-submenu{width:220px;background:var(--sidebar-bg);padding:16px;overflow:auto;border-right:1px solid rgba(11,18,32,0.04)}
.left-submenu .submenu-title{font-size:13px;color:#334155;margin-bottom:8px}
.content{flex:1;padding:20px;overflow:auto}
.menu-icon{width:18px;height:18px;margin-right:8px}
</style>
</head><body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/src/main.tsx"></script>
</body></html>
